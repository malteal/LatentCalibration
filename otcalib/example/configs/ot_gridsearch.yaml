# gridsearch settings
setting:
  job-name: OT_decorr_gridsearch
  chdir: /home/users/a/algren/work/ot_decorrelation
  mem: 24GB
  time: "12:00:00"
runfile: ot_decorrelation.py

# training settings
train_args:
  loss_wasser_ratio : &loss_wasser_ratio [1]
  loss_li_ratio : 0
  lr_f: [0.0001]
  lr_g: [0.0001]
  f_per_g: [4]
  g_per_f: [10]
  nepochs: [150]
  epoch_size: [512]
  datatype: ["prob"]
  # learning_rate_scheduler: [true]

# model settings
model_args:
  n_layers : [4,6,10]
  nonconvex_layersizes : [8,12,16]
  convex_layersizes : [32, 64]
  nonconvex_activation : ["celu", "softplus"]
  convex_activation : ["trainable_softplus"]
  noncvx_norm: ["standard_first"]
  cvx_norm: ["no"]

target_distribution: ["base", "source"]
cvx_dim: [3]
noncvx_dim: [1]

path:
  ["/home/users/a/algren/scratch/trained_networks/decorrelation/OT/3d/gridsearch/"]

device: [cuda]