_target_: otcalib.otcalib.run.DualTraining

optimizer_args_f:
  name: adamw
  args:
    betas: [0.9, 0.99]
    lr: 0.0005
    weight_decay: 0

sch_args_f: 
  name: CosineAnnealingLR
  args: 
    T_max: 128_000
    eta_min: 5e-6

sch_args_g: ${.sch_args_f}
optimizer_args_g: ${.optimizer_args_f}

f_per_g: 4
g_per_f: 10
GRL_bool: True

grad_clip:
  f: 10
  g: 10

epoch_size: 128
nepochs: 1000
verbose: false
burn_in: 10000
device: ${device}
