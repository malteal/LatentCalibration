    /home/users/a/algren/scratch/latn_calib/nominal_combined.h5,
    /home/users/a/algren/scratch/latn_calib/tests/12_12_2024_murr2/QCD_renamedmurr2_0.h5,
    # /home/users/a/algren/scratch/latn_calib/PSmurr2_smeared_combined.h5,
        ]
