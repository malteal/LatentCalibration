_target_: pytorch_lightning.Trainer

# min_epochs: 1
# max_epochs: 4
max_steps: 100000
enable_progress_bar: True
accelerator: gpu
devices: auto
gradient_clip_val: 1.0
precision: "16-mixed"
# check_val_every_n_epoch: 1
val_check_interval: 5_000
num_sanity_val_steps: 2

# Interpolated
default_root_dir: ${paths.save_path}
